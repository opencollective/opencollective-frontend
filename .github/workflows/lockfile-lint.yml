name: Lockfile lint

on:
  pull_request:
    paths:
      - 'package-lock.json'
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lockfile-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate package-lock.json
        run: npx --yes lockfile-lint@5 --path package-lock.json --type npm --validate-https --allowed-hosts registry.npmjs.org
